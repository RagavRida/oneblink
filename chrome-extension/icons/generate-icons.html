<!DOCTYPE html>
<!-- Open this file in Chrome, open the console and run generateIcons() to generate the PNGs -->
<html>
<body>
<canvas id="c"></canvas>
<script>
function drawIcon(size) {
  const canvas = document.getElementById('c');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background rounded rect
  const r = size * 0.22;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#7c6af7';
  ctx.fill();

  // Chat bubble icon (white)
  ctx.fillStyle = 'white';
  const p = size * 0.2;
  const w = size - p * 2;
  const h = w * 0.75;
  const br = size * 0.08;
  const top = (size - h) / 2 - size * 0.04;

  ctx.beginPath();
  ctx.moveTo(p + br, top);
  ctx.lineTo(p + w - br, top);
  ctx.quadraticCurveTo(p + w, top, p + w, top + br);
  ctx.lineTo(p + w, top + h - br);
  ctx.quadraticCurveTo(p + w, top + h, p + w - br, top + h);
  ctx.lineTo(p + w * 0.35, top + h);
  ctx.lineTo(p + w * 0.15, top + h + size * 0.12);
  ctx.lineTo(p + w * 0.15, top + h);
  ctx.lineTo(p + br, top + h);
  ctx.quadraticCurveTo(p, top + h, p, top + h - br);
  ctx.lineTo(p, top + br);
  ctx.quadraticCurveTo(p, top, p + br, top);
  ctx.closePath();
  ctx.fill();

  return canvas.toDataURL('image/png');
}

function generateIcons() {
  [16, 48, 128].forEach(size => {
    const dataUrl = drawIcon(size);
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = `icon${size}.png`;
    a.click();
    console.log(`Downloaded icon${size}.png`);
  });
}

// Auto-run
generateIcons();
</script>
</body>
</html>
