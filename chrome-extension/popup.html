<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oneblink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<!-- Sound-wave background decoration -->
<div class="wave-bg" aria-hidden="true">
  <svg viewBox="0 0 360 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 100 Q30 60 60 100 Q90 140 120 100 Q150 60 180 100 Q210 140 240 100 Q270 60 300 100 Q330 140 360 100" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1.5"/>
    <path d="M0 100 Q20 40 40 100 Q60 160 80 100 Q100 40 120 100 Q140 160 160 100 Q180 40 200 100 Q220 160 240 100 Q260 40 280 100 Q300 160 320 100 Q340 40 360 100" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    <path d="M0 100 Q45 75 90 100 Q135 125 180 100 Q225 75 270 100 Q315 125 360 100" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="2"/>
  </svg>
</div>

<header>
  <!-- Oneblink logo: pulsing circle mark -->
  <div class="logo">
    <div class="logo-mark" aria-hidden="true">
      <span class="logo-circle"></span>
    </div>
    <span class="logo-name">Oneblink</span>
  </div>

  <div class="status-pill" id="status-pill">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">starting</span>
  </div>
</header>

<main id="main-area">

  <!-- Idle: two action buttons -->
  <div id="idle-view">

    <div class="tagline">
      <p>Your screen,<br><em>described.</em></p>
    </div>

    <div class="action-grid">

      <!-- Describe screen -->
      <button class="action-card" id="screenshot-btn" disabled aria-label="Describe screen">
        <div class="card-icon-wrap">
          <!-- Eye / scan icon -->
          <svg class="card-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="card-text">
          <span class="card-title">Describe screen</span>
          <span class="card-sub">Reads aloud what's visible</span>
        </div>
        <div class="card-arrow" aria-hidden="true">→</div>
      </button>

      <!-- Ask about screen -->
      <button class="action-card" id="mic-btn" disabled aria-label="Ask about screen">
        <div class="card-icon-wrap">
          <svg class="card-icon icon-mic" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="9" y="2" width="6" height="12" rx="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5 10C5 14.418 8.134 18 12 18C15.866 18 19 14.418 19 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="12" y1="18" x2="12" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <svg class="card-icon icon-mic-active" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none">
            <rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor"/>
            <path d="M5 10C5 14.418 8.134 18 12 18C15.866 18 19 14.418 19 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="12" y1="18" x2="12" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="card-text">
          <span class="card-title" id="mic-title">Ask about screen</span>
          <span class="card-sub" id="mic-sub">Tap to speak</span>
        </div>
        <div class="card-arrow" aria-hidden="true" id="mic-arrow">→</div>
      </button>

    </div>
  </div>

  <!-- Processing state -->
  <div id="processing-view" style="display:none" aria-live="polite">
    <div class="processing-orb">
      <div class="orb-ring orb-ring-1"></div>
      <div class="orb-ring orb-ring-2"></div>
      <div class="orb-ring orb-ring-3"></div>
      <div class="orb-core">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="white" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="3" fill="white"/>
        </svg>
      </div>
    </div>
    <p class="processing-step" id="processing-label">Processing…</p>
  </div>

</main>

<!-- Error toast -->
<div id="error-toast" style="display:none" role="alert" aria-live="assertive">
  <svg viewBox="0 0 16 16" fill="none">
    <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.2"/>
    <line x1="8" y1="5" x2="8" y2="9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="8" cy="11.5" r="0.7" fill="currentColor"/>
  </svg>
  <span id="error-text"></span>
</div>

<!-- API unavailable overlay -->
<div id="unsupported" style="display:none">
  <!-- Pulsing circle mark for unavailable state -->
  <div class="unsupported-mark" aria-hidden="true">
    <span class="unsupported-circle"></span>
  </div>
  <p class="unsupported-title">Model unavailable</p>
  <p class="unsupported-body">Enable the Prompt API in <strong>chrome://flags</strong> — search <em>nano</em> and restart Chrome.</p>
</div>

<script src="popup.js" type="module"></script>
</body>
</html>
